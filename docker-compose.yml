services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Local dev defaults; override via Porter env vars in production.
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://stress:stress@postgres:5432/stress}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MAX_JOB_DURATION_SEC: ${MAX_JOB_DURATION_SEC:-600}
      MAX_WORKERS_PER_JOB: ${MAX_WORKERS_PER_JOB:-50}
      MAX_CONNECTIONS_PER_JOB: ${MAX_CONNECTIONS_PER_JOB:-200}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS:-5}
      ALLOW_DISK_WORKLOADS: ${ALLOW_DISK_WORKLOADS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stress
      POSTGRES_PASSWORD: stress
      POSTGRES_DB: stress
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stress"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
