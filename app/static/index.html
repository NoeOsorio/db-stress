<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Porter DB Stress</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0c0f14;
    --panel: #141923;
    --panel-2: #1c2230;
    --border: #2a3344;
    --fg: #e6edf6;
    --muted: #8896a8;
    --accent: #4cb2ff;
    --good: #4ddc92;
    --warn: #ffb347;
    --bad: #ff6b6b;
    --pg: #336791;
    --redis: #d82c20;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.4px; }
  header .badges { display: flex; gap: 8px; }
  .badge {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .badge.ok { color: var(--good); border-color: rgba(77, 220, 146, 0.4); }
  .badge.bad { color: var(--bad); border-color: rgba(255, 107, 107, 0.4); }

  main {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 18px;
    padding: 18px;
  }
  @media (max-width: 980px) { main { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .panel h2 {
    margin: 0 0 12px 0;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
  }

  .row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
  .row > label { flex: 0 0 110px; color: var(--muted); font-size: 12px; }
  .row > .ctrl { flex: 1; display: flex; align-items: center; gap: 8px; }

  select, input[type="number"] {
    width: 100%;
    background: var(--panel-2);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 9px;
    font: inherit;
  }
  input[type="range"] { flex: 1; }
  .range-val { width: 70px; text-align: right; font-variant-numeric: tabular-nums; color: var(--fg); }

  .target-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .target-tabs button {
    flex: 1;
    padding: 8px 0;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    font: inherit;
  }
  .target-tabs button.active { color: var(--fg); border-color: var(--accent); background: rgba(76, 178, 255, 0.08); }

  button.primary, button.danger {
    width: 100%;
    padding: 10px 14px;
    border-radius: 6px;
    font: inherit;
    font-weight: 600;
    border: 0;
    cursor: pointer;
  }
  button.primary { background: var(--accent); color: #0b1117; }
  button.primary:disabled { opacity: 0.45; cursor: not-allowed; }
  button.danger { background: var(--bad); color: #fff; margin-top: 10px; }

  .jobs-grid { display: flex; flex-direction: column; gap: 10px; }
  .job {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--muted);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .job.running { border-left-color: var(--accent); }
  .job.done { border-left-color: var(--good); }
  .job.error { border-left-color: var(--bad); }
  .job.stopped { border-left-color: var(--warn); }
  .job-head { display: flex; justify-content: space-between; align-items: center; }
  .job-head .title { font-weight: 600; }
  .job-head .target.postgres { color: #79b8ff; }
  .job-head .target.redis { color: #ff8a85; }
  .job-meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .job-metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 10px;
    font-variant-numeric: tabular-nums;
  }
  .metric { background: var(--panel); border-radius: 6px; padding: 8px 10px; }
  .metric .k { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; }
  .metric .v { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .job-actions { margin-top: 10px; display: flex; gap: 8px; }
  .job-actions button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    font: inherit;
    font-size: 12px;
  }
  .job-actions button:hover { color: var(--fg); border-color: var(--fg); }

  .chart-wrap { height: 220px; margin-top: 8px; position: relative; }

  .hint { font-size: 11px; color: var(--muted); margin-top: -6px; margin-bottom: 12px; line-height: 1.5; }

  .footer-note {
    margin-top: 14px;
    padding: 10px 12px;
    background: rgba(255, 179, 71, 0.08);
    border: 1px solid rgba(255, 179, 71, 0.3);
    border-radius: 6px;
    font-size: 12px;
    color: var(--warn);
  }
</style>
</head>
<body>

<header>
  <h1>Porter DB Stress</h1>
  <div class="badges">
    <span id="pg-badge" class="badge">postgres: …</span>
    <span id="redis-badge" class="badge">redis: …</span>
    <span id="ws-badge" class="badge">ws: …</span>
  </div>
</header>

<main>
  <section class="panel">
    <h2>New stress job</h2>

    <div class="target-tabs">
      <button id="tab-postgres" class="active" data-target="postgres">Postgres</button>
      <button id="tab-redis" data-target="redis">Redis</button>
    </div>

    <div class="row">
      <label>Workload</label>
      <div class="ctrl">
        <select id="workload"></select>
      </div>
    </div>
    <div id="workload-hint" class="hint"></div>

    <div class="row">
      <label>Duration (s)</label>
      <div class="ctrl">
        <input type="range" id="duration" min="10" max="600" value="60" step="5">
        <span class="range-val" id="duration-val">60</span>
      </div>
    </div>

    <div class="row" id="row-workers">
      <label>Workers</label>
      <div class="ctrl">
        <input type="range" id="workers" min="1" max="50" value="4" step="1">
        <span class="range-val" id="workers-val">4</span>
      </div>
    </div>

    <div class="row" id="row-connections" style="display:none;">
      <label>Connections</label>
      <div class="ctrl">
        <input type="range" id="connections" min="1" max="200" value="50" step="1">
        <span class="range-val" id="connections-val">50</span>
      </div>
    </div>

    <div class="row" id="row-intensity" style="display:none;">
      <label>Intensity</label>
      <div class="ctrl">
        <input type="range" id="intensity" min="10000" max="1000000" value="200000" step="10000">
        <span class="range-val" id="intensity-val">200k</span>
      </div>
    </div>

    <div class="row" id="row-value-bytes" style="display:none;">
      <label>Value bytes</label>
      <div class="ctrl">
        <input type="range" id="value_bytes" min="64" max="65536" value="4096" step="64">
        <span class="range-val" id="value_bytes-val">4096</span>
      </div>
    </div>

    <button id="start-btn" class="primary">Start workload</button>
    <button id="stop-all-btn" class="danger">Stop ALL running jobs</button>

    <div class="footer-note">
      Hard caps from server: duration ≤ <span id="cap-dur">?</span>s ·
      workers ≤ <span id="cap-w">?</span> ·
      conns ≤ <span id="cap-c">?</span> ·
      jobs ≤ <span id="cap-j">?</span>
    </div>
  </section>

  <section class="panel">
    <h2>Live throughput (ops/sec, all running jobs)</h2>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>

    <h2 style="margin-top: 20px;">Jobs</h2>
    <div id="jobs" class="jobs-grid"></div>
  </section>
</main>

<script>
const $ = (s) => document.querySelector(s);
const els = {
  tabPg: $('#tab-postgres'),
  tabRedis: $('#tab-redis'),
  workload: $('#workload'),
  workloadHint: $('#workload-hint'),
  duration: $('#duration'), durationVal: $('#duration-val'),
  workers: $('#workers'), workersVal: $('#workers-val'), rowWorkers: $('#row-workers'),
  connections: $('#connections'), connectionsVal: $('#connections-val'), rowConnections: $('#row-connections'),
  intensity: $('#intensity'), intensityVal: $('#intensity-val'), rowIntensity: $('#row-intensity'),
  valueBytes: $('#value_bytes'), valueBytesVal: $('#value_bytes-val'), rowValueBytes: $('#row-value-bytes'),
  startBtn: $('#start-btn'),
  stopAllBtn: $('#stop-all-btn'),
  pgBadge: $('#pg-badge'),
  redisBadge: $('#redis-badge'),
  wsBadge: $('#ws-badge'),
  jobs: $('#jobs'),
  capDur: $('#cap-dur'), capW: $('#cap-w'), capC: $('#cap-c'), capJ: $('#cap-j'),
};

const WORKLOADS = {
  postgres: [
    { v: 'connections', label: 'Connections storm',        hint: 'Open N idle sessions and hold them. Drives DatabaseConnections on RDS/Aurora.' },
    { v: 'cpu',         label: 'CPU burn (sort + md5)',     hint: 'CPU-heavy queries with no disk writes. Drives CPUUtilization.' },
    { v: 'memory',      label: 'Memory pressure',           hint: 'Big hash aggregates that exceed work_mem. Drives FreeableMemory ↓ / SwapUsage.' },
    { v: 'disk',        label: 'Disk churn (INSERT/DELETE)',hint: 'WAL-heavy write workload on a temp table. Drives WriteIOPS / WriteThroughput. Cleans up on stop.' },
    { v: 'oltp',        label: 'Mixed OLTP (75/25 r/w)',    hint: 'pgbench-style read/write mix on a small accounts table. Realistic baseline.' },
  ],
  redis: [
    { v: 'connections', label: 'Connections storm',        hint: 'Open N persistent connections. Drives CurrConnections / NewConnections on ElastiCache.' },
    { v: 'cpu',         label: 'CPU burn (pipelined ops)', hint: 'High op/sec via pipelined GET/SET. Drives EngineCPUUtilization.' },
    { v: 'memory',      label: 'Memory fill (TTLed)',      hint: 'Writes 4KB+ values under stresstest_* keys with TTL. Drives BytesUsedForCache.' },
    { v: 'disk',        label: 'BGSAVE churn',             hint: 'Periodic BGSAVE + big writes. Some ElastiCache configs forbid BGSAVE — the job logs and continues.' },
  ],
};

let currentTarget = 'postgres';
let caps = null;

function renderWorkloads() {
  els.workload.innerHTML = '';
  WORKLOADS[currentTarget].forEach(w => {
    const o = document.createElement('option');
    o.value = w.v; o.textContent = w.label;
    els.workload.appendChild(o);
  });
  onWorkloadChange();
}

function fmtNum(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n / 1_000).toFixed(0) + 'k';
  return String(n);
}

function onWorkloadChange() {
  const w = els.workload.value;
  const meta = WORKLOADS[currentTarget].find(x => x.v === w);
  els.workloadHint.textContent = meta ? meta.hint : '';
  // Show/hide rows by workload
  els.rowConnections.style.display = (w === 'connections') ? '' : 'none';
  els.rowWorkers.style.display = (w === 'connections') ? 'none' : '';
  els.rowIntensity.style.display = (currentTarget === 'postgres' && w === 'cpu') ? '' : 'none';
  els.rowValueBytes.style.display = (currentTarget === 'redis' && w === 'memory') ? '' : 'none';
}

function setTarget(t) {
  currentTarget = t;
  els.tabPg.classList.toggle('active', t === 'postgres');
  els.tabRedis.classList.toggle('active', t === 'redis');
  renderWorkloads();
}
els.tabPg.onclick = () => setTarget('postgres');
els.tabRedis.onclick = () => setTarget('redis');
els.workload.onchange = onWorkloadChange;

function bindRange(input, out, fmt = (v) => v) {
  const sync = () => { out.textContent = fmt(input.value); };
  input.addEventListener('input', sync);
  sync();
}
bindRange(els.duration, els.durationVal);
bindRange(els.workers, els.workersVal);
bindRange(els.connections, els.connectionsVal);
bindRange(els.intensity, els.intensityVal, v => fmtNum(parseInt(v)));
bindRange(els.valueBytes, els.valueBytesVal);

async function loadConfig() {
  const r = await fetch('/api/config').then(r => r.json());
  caps = r.caps;
  els.capDur.textContent = caps.max_job_duration_sec;
  els.capW.textContent = caps.max_workers_per_job;
  els.capC.textContent = caps.max_connections_per_job;
  els.capJ.textContent = caps.max_concurrent_jobs;
  els.duration.max = caps.max_job_duration_sec;
  els.workers.max = caps.max_workers_per_job;
  els.connections.max = caps.max_connections_per_job;
}
async function loadTargetCheck() {
  const r = await fetch('/api/targets/check').then(r => r.json());
  const setBadge = (el, name, info) => {
    el.classList.remove('ok', 'bad');
    if (info.ok) {
      el.classList.add('ok');
      el.textContent = `${name}: ${info.version || 'ok'}`;
    } else {
      el.classList.add('bad');
      el.textContent = `${name}: ${info.error || 'down'}`;
    }
  };
  setBadge(els.pgBadge, 'postgres', r.postgres);
  setBadge(els.redisBadge, 'redis', r.redis);
}

els.startBtn.onclick = async () => {
  const w = els.workload.value;
  const body = {
    target: currentTarget,
    workload: w,
    duration_seconds: parseFloat(els.duration.value),
  };
  if (w === 'connections') {
    body.connections = parseInt(els.connections.value);
  } else {
    body.workers = parseInt(els.workers.value);
  }
  if (currentTarget === 'postgres' && w === 'cpu') body.intensity = parseInt(els.intensity.value);
  if (currentTarget === 'redis' && w === 'memory') body.value_bytes = parseInt(els.valueBytes.value);

  els.startBtn.disabled = true;
  try {
    const r = await fetch('/api/jobs', {
      method: 'POST',
      headers: {'content-type': 'application/json'},
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      alert('Failed: ' + (e.detail || r.statusText));
    }
  } finally {
    els.startBtn.disabled = false;
  }
};

els.stopAllBtn.onclick = async () => {
  if (!confirm('Stop all running stress jobs?')) return;
  await fetch('/api/jobs/stop-all', { method: 'POST' });
};

// ---- Jobs rendering ----
const jobs = new Map();

function renderJobs() {
  els.jobs.innerHTML = '';
  const list = Array.from(jobs.values()).sort((a, b) => b.metrics.elapsed_sec - a.metrics.elapsed_sec);
  if (!list.length) {
    els.jobs.innerHTML = '<div class="job" style="border-left-color: var(--border); color: var(--muted);">No jobs yet. Start one on the left →</div>';
    return;
  }
  for (const j of list) {
    const el = document.createElement('div');
    el.className = `job ${j.status}`;
    el.innerHTML = `
      <div class="job-head">
        <span class="title">
          <span class="target ${j.target}">${j.target}</span>
          · ${j.workload}
          <span style="color: var(--muted); font-weight: 400;">— ${j.status}</span>
        </span>
        <span style="color: var(--muted); font-size: 11px;">id ${j.id}</span>
      </div>
      <div class="job-meta">
        ${Object.entries(j.params).map(([k,v]) => `${k}=${v}`).join(' · ')}
        ${j.error ? `<div style="color: var(--bad); margin-top: 4px;">err: ${j.error}</div>` : ''}
      </div>
      <div class="job-metrics">
        <div class="metric"><div class="k">elapsed</div><div class="v">${j.metrics.elapsed_sec}s</div></div>
        <div class="metric"><div class="k">ops</div><div class="v">${j.metrics.ops}</div></div>
        <div class="metric"><div class="k">ops/sec</div><div class="v">${j.metrics.ops_per_sec}</div></div>
        <div class="metric"><div class="k">avg latency</div><div class="v">${j.metrics.avg_latency_ms}ms</div></div>
      </div>
      ${j.status === 'running' ? `<div class="job-actions"><button data-stop="${j.id}">Stop this job</button></div>` : ''}
    `;
    els.jobs.appendChild(el);
  }
  els.jobs.querySelectorAll('button[data-stop]').forEach(b => {
    b.onclick = () => fetch(`/api/jobs/${b.dataset.stop}/stop`, { method: 'POST' });
  });
}

// ---- Chart ----
const chart = new Chart($('#chart').getContext('2d'), {
  type: 'line',
  data: { labels: [], datasets: [] },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      x: { ticks: { color: '#8896a8' }, grid: { color: '#1c2230' } },
      y: { ticks: { color: '#8896a8' }, grid: { color: '#1c2230' }, beginAtZero: true },
    },
    plugins: { legend: { labels: { color: '#e6edf6' } } },
  },
});

const seriesByJob = new Map(); // jobId -> { data: number[] }
let tickIdx = 0;
const MAX_POINTS = 60;

function pushTick() {
  tickIdx++;
  chart.data.labels.push(tickIdx);
  if (chart.data.labels.length > MAX_POINTS) chart.data.labels.shift();
  // For each job we know about, append latest ops/sec
  for (const [id, job] of jobs) {
    let s = seriesByJob.get(id);
    if (!s) {
      const color = `hsl(${(parseInt(id, 16) % 360)}, 70%, 60%)`;
      s = { data: [], dataset: {
        label: `${job.target}/${job.workload} #${id.slice(0,4)}`,
        data: [], borderColor: color, backgroundColor: color, tension: 0.25, borderWidth: 2, pointRadius: 0,
      } };
      seriesByJob.set(id, s);
      chart.data.datasets.push(s.dataset);
    }
    const v = job.status === 'running' ? job.metrics.ops_per_sec : 0;
    s.dataset.data.push(v);
    if (s.dataset.data.length > MAX_POINTS) s.dataset.data.shift();
  }
  chart.update('none');
}
setInterval(pushTick, 1000);

// ---- WebSocket ----
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => {
    els.wsBadge.classList.remove('bad'); els.wsBadge.classList.add('ok');
    els.wsBadge.textContent = 'ws: connected';
  };
  ws.onclose = () => {
    els.wsBadge.classList.remove('ok'); els.wsBadge.classList.add('bad');
    els.wsBadge.textContent = 'ws: reconnecting…';
    setTimeout(connectWS, 1500);
  };
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'snapshot') {
      for (const j of msg.jobs) jobs.set(j.id, j);
    } else if (msg.type === 'job_started' || msg.type === 'job_finished') {
      jobs.set(msg.job.id, msg.job);
    } else if (msg.type === 'job_tick') {
      const j = jobs.get(msg.id);
      if (j) { j.metrics = msg.snapshot; j.status = msg.status; }
    }
    renderJobs();
  };
}

// ---- boot ----
(async () => {
  await loadConfig();
  await loadTargetCheck();
  setTarget('postgres');
  renderJobs();
  connectWS();
  setInterval(loadTargetCheck, 15000);
})();
</script>
</body>
</html>
